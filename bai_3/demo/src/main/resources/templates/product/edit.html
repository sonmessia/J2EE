<!doctype html>
<html
  lang="en"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <meta charset="UTF-8" />
    <title>Edit Product</title>
  </head>
  <body>
    <div th:fragment="content" class="container mt-5">
      <h2>Edit Product</h2>
      <hr />

      <form
        th:action="@{/products/edit}"
        th:object="${product}"
        method="post"
        enctype="multipart/form-data"
      >
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
          <label for="name" class="form-label">Product Name:</label>
          <input
            type="text"
            th:field="*{name}"
            class="form-control"
            id="name"
          />
          <div
            class="text-danger"
            th:if="${#fields.hasErrors('name')}"
            th:errors="*{name}"
          ></div>
        </div>

        <div class="mb-3">
          <label for="price" class="form-label">Price:</label>
          <input
            type="number"
            step="0.01"
            th:field="*{price}"
            class="form-control"
            id="price"
          />
          <div
            class="text-danger"
            th:if="${#fields.hasErrors('price')}"
            th:errors="*{price}"
          ></div>
        </div>

        <div class="mb-3">
          <label for="category" class="form-label">Category:</label>
          <select class="form-select" id="category" name="category.id">
            <option
              th:each="cat : ${categories}"
              th:value="${cat.id}"
              th:text="${cat.name}"
              th:selected="${cat.id == product.category?.id}"
            ></option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Current Image:</label><br />
          <img
            th:src="@{'/images/' + *{image}}"
            height="150"
            width="180"
            class="img-thumbnail mb-2"
            alt="Current Product Image"
          />

          <label for="imageProduct" class="form-label d-block"
            >Change Image:</label
          >
          <input
            type="file"
            name="imageProduct"
            id="imageProduct"
            class="form-control"
            accept="image/*"
          />
        </div>

        <button type="submit" class="btn btn-success">Update Product</button>
        <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </body>
</html>
