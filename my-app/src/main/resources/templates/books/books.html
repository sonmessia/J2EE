<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Books Management</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .btn {
        padding: 8px 16px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        color: white;
      }
      .btn-primary {
        background-color: #007bff;
      }
      .btn-success {
        background-color: #28a745;
      }
      .btn-warning {
        background-color: #ffc107;
        color: black;
      }
      .btn-danger {
        background-color: #dc3545;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th,
      td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #ddd;
      }
      th {
        background-color: #f8f9fa;
      }
      .actions {
        display: flex;
        gap: 5px;
      }
      .empty-state {
        text-align: center;
        color: #6c757d;
        margin: 40px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Books Management</h1>
        <a href="/books/add" class="btn btn-success">Add New Book</a>
      </div>

      <div
        th:if="${books == null or #lists.isEmpty(books)}"
        class="empty-state"
      >
        <h3>No books found</h3>
        <p>Start by adding your first book.</p>
      </div>

      <table th:if="${books != null and not #lists.isEmpty(books)}">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>Price</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="book : ${books}">
            <td th:text="${book.id}">1</td>
            <td th:text="${book.title}">Book Title</td>
            <td th:text="${book.author}">Author Name</td>
            <td th:text="'$' + ${book.price}">$19.99</td>
            <td class="actions">
              <a
                th:href="@{/books/edit/{id}(id=${book.id})}"
                class="btn btn-warning"
                >Edit</a
              >
              <a
                th:href="@{/books/delete/{id}(id=${book.id})}"
                class="btn btn-danger"
                onclick="
                  return confirm(
                    'Are you sure you want to delete this book?',
                  );
                "
                >Delete</a
              >
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
