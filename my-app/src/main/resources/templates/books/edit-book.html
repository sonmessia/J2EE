<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Edit Book</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
      }
      .header {
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input[type="text"],
      input[type="number"],
      input[type="date"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      .btn {
        padding: 10px 20px;
        border: none;
        cursor: pointer;
        text-decoration: none;
        color: white;
      }
      .btn-primary {
        background-color: #007bff;
      }
      .btn-secondary {
        background-color: #6c757d;
      }
      .btn-warning {
        background-color: #ffc107;
        color: black;
      }
      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      .error {
        color: #dc3545;
        font-size: 14px;
        margin-top: 5px;
      }
      .alert {
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 4px;
      }
      .alert-danger {
        background-color: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .alert-success {
        background-color: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .book-info {
        background-color: #f8f9fa;
        padding: 15px;
        border-radius: 4px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Edit Book</h1>
        <a href="/books" class="btn btn-secondary">← Back to Books</a>
      </div>

      <div th:if="${success}" class="alert alert-success" th:text="${success}">
        Book updated successfully!
      </div>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}">
        An error occurred while updating the book.
      </div>

      <div th:if="${book}" class="book-info">
        <strong>Book ID:</strong> <span th:text="${book.id}">1</span>
      </div>

      <form
        th:if="${book}"
        th:action="@{/books/edit}"
        method="post"
        th:object="${book}"
      >
        <div class="form-group">
          <label for="title">Title *</label>
          <input type="text" id="title" th:field="*{title}" required />
          <div
            th:if="${#fields.hasErrors('title')}"
            th:errors="*{title}"
            class="error"
          >
            Title error
          </div>
        </div>

        <div class="form-group">
          <label for="author">Author *</label>
          <input type="text" id="author" th:field="*{author}" required />
          <div
            th:if="${#fields.hasErrors('author')}"
            th:errors="*{author}"
            class="error"
          >
            Author error
          </div>
        </div>

        <div class="form-group">
          <label for="price">Price *</label>
          <input
            type="number"
            id="price"
            th:field="*{price}"
            step="0.01"
            min="0"
            required
          />
          <div
            th:if="${#fields.hasErrors('price')}"
            th:errors="*{price}"
            class="error"
          >
            Price error
          </div>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-warning">Update Book</button>
          <a href="/books" class="btn btn-secondary">Cancel</a>
        </div>
      </form>

      <div th:unless="${book}" class="alert alert-danger">
        Book not found. <a href="/books">Return to books list</a>
      </div>
    </div>
  </body>
</html>
